; PlatformIO project config for lumi-firmware
; Single binary for all Lumi ESP32 LED controllers.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Library dependencies.
; LumiProtocol comes from the git submodule at vendor/lumi-protocol. The Arduino
; library lives in device/arduino/ (not the repo root), so it is exposed via
; lib_extra_dirs below — not lib_deps. LumiProtocol declares PubSubClient as a
; dependency in its library.json, but under lib_extra_dirs the LDF does not pull
; it transitively, so PubSubClient is listed explicitly below. The library's
; LumiCodec headers (lib/LumiCodec/) are likewise not on the include path under
; lib_extra_dirs, so they are added via build_flags.
lib_deps =
    fastled/FastLED @ ^3.6.0
    knolleary/PubSubClient @ ^2.8

lib_extra_dirs =
    vendor/lumi-protocol/device/arduino
    vendor/lumi-protocol/device/arduino/lib

build_flags =
    -I vendor/lumi-protocol/device/arduino/lib/LumiCodec
